name: token-core

# CI for the C++ token core (app/src/token) and its cross-language conformance
# tests. Mirrors the SCITT CCF-app CI: the build runs inside CCF's Azure Linux
# base image and installs the official CCF development RPM (no CCF source build).
# The GitHub-hosted runner is only the host that launches the container; the
# build/test steps all execute inside mcr.microsoft.com/azurelinux/base/core:3.0.
on:
  push:
    paths:
      - "app/**"
      - "tools/sd_cwt/**"
      - "scripts/ci-cpp-tests.sh"
      - ".github/workflows/token_core.yml"
  pull_request:
    paths:
      - "app/**"
      - "tools/sd_cwt/**"
      - "scripts/ci-cpp-tests.sh"
      - ".github/workflows/token_core.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cpp-tests:
    name: C++ token core + conformance
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/azurelinux/base/core:3.0
      options: --user root
    env:
      # Released CCF development RPM to install (matches our third_party/CCF).
      CCF_VERSION: "7.0.5"
    steps:
      # The base image ships Microsoft's RPM signing key but does not import it
      # into the gpg keyring, so tdnf's repo metadata check fails with
      # "No public key". Import it first (as CCF and SCITT CI do).
      - name: Set up environment (GPG key, base tools, CCF RPM)
        run: |
          set -ex
          gpg --import /etc/pki/rpm-gpg/MICROSOFT-RPM-GPG-KEY
          tdnf -y update
          tdnf -y install \
            git build-essential cmake ninja-build python3-pip ca-certificates \
            jq which procps tar clang clang-tools-extra-devel
          curl -L "https://github.com/microsoft/CCF/releases/download/ccf-${CCF_VERSION}/ccf_devel_${CCF_VERSION//-/_}_x86_64.rpm" -o ccf.rpm
          tdnf -y install ./ccf.rpm
          rm -f ccf.rpm

      - uses: actions/checkout@v4
        # The CCF submodule is not needed: we build against the installed CCF
        # development package, not from source.

      - name: Work around git safe.directory in container
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # The ccf_devel RPM installs CCF's CMake package; discover its prefix
      # rather than hard-coding a path.
      - name: Locate CCF install
        id: ccf
        run: |
          set -ex
          cfg=$(find / -name ccf-config.cmake 2>/dev/null | head -1)
          test -n "$cfg"
          echo "prefix=$(dirname "$(dirname "$cfg")")" >> "$GITHUB_OUTPUT"

      - name: Build + test token core and run Python conformance
        env:
          INSTALL_DIR: ${{ steps.ccf.outputs.prefix }}
          BUILD_DIR: app/build-test
        run: ./scripts/ci-cpp-tests.sh
