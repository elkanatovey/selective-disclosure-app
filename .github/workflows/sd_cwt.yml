name: sd_cwt

# CI for the off-chain SD-CWT Python package. Scoped to its path so unrelated
# changes don't trigger it. Inspired by the SCITT repo's split of format/type
# checks from the test run, with pip caching for fast installs.
on:
  push:
    paths:
      - "tools/sd_cwt/**"
      - ".github/workflows/sd_cwt.yml"
  pull_request:
    paths:
      - "tools/sd_cwt/**"
      - ".github/workflows/sd_cwt.yml"
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Format & types (black / isort / mypy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/sd_cwt
    steps:
      # Default checkout skips the CCF submodule - not needed for Python, keeps it fast.
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: tools/sd_cwt/pyproject.toml
      - name: Install lint deps
        run: pip install -e ".[lint]"
      - name: black
        run: black --check src tests
      - name: isort
        run: isort --check src tests
      - name: mypy
        run: mypy src/sd_cwt
      - name: License headers
        run: python scripts/notice_check.py

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/sd_cwt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: tools/sd_cwt/pyproject.toml
      - name: Install package + test deps
        run: pip install -e ".[test]"
      - name: Run tests
        run: pytest -q
